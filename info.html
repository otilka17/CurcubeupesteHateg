<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identitate Oficială | Suflet Hunedoarean</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --auriu: #c5a059; --crem: #fdfaf3; --text: #4a4a4a; }
        body { background: var(--crem); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .header-info { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; }
        .back-link { font-family: 'Cinzel'; font-size: 0.7rem; color: var(--auriu); text-decoration: none; letter-spacing: 2px; }

        .info-container { max-width: 900px; margin: 50px auto; padding: 20px; }
        
        .identity-card { 
            background: #fff; border: 1px solid #eee; padding: 60px; 
            box-shadow: 0 20px 50px rgba(197,160,89,0.1); position: relative;
        }
        .identity-card h1 { font-family: 'Playfair Display'; font-style: italic; color: var(--auriu); font-size: 2.2rem; margin-bottom: 40px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }

        .data-row { display: flex; margin-bottom: 20px; font-size: 0.9rem; border-bottom: 1px solid #f9f9f9; padding-bottom: 10px; }
        .label { font-family: 'Cinzel'; color: var(--auriu); width: 120px; font-weight: 700; font-size: 0.7rem; letter-spacing: 1px; }
        .value { color: #222; font-weight: 400; }

        .mission-footer { background: #c5a059; color: #fff; padding: 60px 40px; text-align: center; margin-top: 80px; }
        .mission-footer h2 { font-family: 'Cinzel'; letter-spacing: 4px; font-size: 1.1rem; margin-bottom: 20px; }
        .mission-footer p { font-size: 0.9rem; line-height: 1.8; max-width: 600px; margin: 0 auto; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header-info">
        <a href="index.html" class="back-link">← ÎNAPOI</a>
        <div style="font-family:'Cinzel'; font-size:0.8rem; color:var(--auriu); letter-spacing:4px;">INFO ASOCIAȚIE</div>
    </div>

    <main class="info-container">
        <div class="identity-card">
            <span style="font-family:'Cinzel'; font-size:0.6rem; letter-spacing:3px; color:#aaa;">IDENTITATE OFICIALĂ</span>
            <h1>Suflet Hunedoarean</h1>
            
            <div class="data-row"><div class="label">CUI:</div><div class="value">36345078</div></div>
            <div class="data-row"><div class="label">ÎNFIINȚARE:</div><div class="value">2016</div></div>
            <div class="data-row"><div class="label">SURSĂ:</div><div class="value">Parohia Totești</div></div>
            <div class="data-row"><div class="label">MISIUNE:</div><div class="value">Viitorul Copiilor</div></div>
        </div>

        <section class="mission-footer">
            <h2>MISIUNEA NOASTRĂ</h2>
            <p>Creștem împreună o generație legată de pământ și credință, prin pelerinaje, tabere de creație și explorare autentică a Hațegului.</p>
        </section>
    </main>

</body>
</html>
